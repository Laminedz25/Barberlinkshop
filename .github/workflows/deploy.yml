name: 🚀 Deploy BarberLink to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout code ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── 4. Build the React app ────────────────────────────────
      - name: 🏗️ Build production bundle
        run: npm run build

      # ── 5. Upload dist/ to VPS via SCP ───────────────────────
      - name: 📤 Upload dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "dist/,nginx.conf,Dockerfile,docker-compose.yml"
          target: "/opt/Barberlinkshop"
          overwrite: true

      # ── 6. Deploy on VPS ─────────────────────────────────────
      - name: 🚀 Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script_stop: true
          script: |
            set -e
            echo "=== Deploying BarberLink ==="
            cd /opt/Barberlinkshop

            # Rebuild and restart only the barberlink container
            docker compose build --no-cache barberlink
            docker compose up -d --force-recreate barberlink

            # Verify the container started
            sleep 5
            if docker ps --filter "name=barberlink_app" --filter "status=running" | grep -q "barberlink_app"; then
              echo "✅ BarberLink deployed! Status: $(docker ps --filter 'name=barberlink_app' --format '{{.Status}}')"
            else
              echo "❌ Container failed to start!"
              docker logs barberlink_app --tail 30
              exit 1
            fi

      # ── 7. Notifications ──────────────────────────────────────
      - name: ✅ Deployment Success
        if: success()
        run: echo "🎉 Deployed to https://barberlink.cloud — Commit ${{ github.sha }}"

      - name: ❌ Deployment Failed
        if: failure()
        run: echo "💥 Deployment failed! Check logs above."
