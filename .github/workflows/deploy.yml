name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: "72.61.71.63"
          username: "deploy"
          key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACCYqpVxqrEDcojqxUDuElbGc6VkdQsP3W5LXQCe4YSIWQAAAJA8MFAhPDBQ
            IQAAAAtzc2gtZWQyNTUxOQAAACCYqpVxqrEDcojqxUDuElbGc6VkdQsP3W5LXQCe4YSIWQ
            AAAECZFgFO5LqGfr2cmnXWv7Krfg5ouKwYv4mLuHOEEroVDJiqlXGqsQNyiOrFQO4SVsZz
            pWR1Cw/dbktdAJ7hhIhZAAAABmRlcGxveQECAwQFBgc=
            -----END OPENSSH PRIVATE KEY-----
          script: |
            echo "Starting deployment..."
            mkdir -p /opt/Barberlinkshop
            cd /opt/Barberlinkshop
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }} .
            fi
            docker compose down || true
            docker compose up -d --build
            echo "Deployment successful!"
