name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Commit built dist to repo
        run: |
          git config user.email "deploy@barberlink.cloud"
          git config user.name "DeployBot"
          git add dist -f
          git diff --staged --quiet || git commit -m "ci: update built dist [skip ci]"
          git push https://${{ secrets['GH_PAT'] }}@github.com/Laminedz25/Barberlinkshop.git HEAD:main

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets['VPS_HOST'] }}
          username: ${{ secrets['VPS_USERNAME'] }}
          key: ${{ secrets['VPS_PRIVATE_KEY'] }}
          script: |
            echo "Starting deployment..."
            mkdir -p /opt/Barberlinkshop
            cd /opt/Barberlinkshop
            if [ -d ".git" ]; then
              git remote set-url origin https://${{ secrets['GH_PAT'] }}@github.com/Laminedz25/Barberlinkshop.git
              git pull origin main
            else
              git clone https://${{ secrets['GH_PAT'] }}@github.com/Laminedz25/Barberlinkshop.git .
            fi
            docker compose down || true
            docker compose up -d --build
            echo "Deployment complete!"
