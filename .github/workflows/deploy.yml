name: 🚀 Deploy BarberLink to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout code ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── 4. Build the React app ────────────────────────────────
      - name: 🏗️ Build production bundle
        run: npm run build

      # ── 5. Package build artifacts ────────────────────────────
      - name: 📦 Package dist folder
        run: |
          tar -czf deploy.tar.gz dist/ nginx.conf Dockerfile docker-compose.yml
          echo "Archive size: $(du -sh deploy.tar.gz)"

      # ── 6. Install sshpass for password auth ──────────────────
      - name: 🔑 Install SSH tools
        run: sudo apt-get install -y sshpass

      # ── 7. Upload via SCP with sshpass ────────────────────────  
      - name: 📤 Upload to VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            deploy.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/Barberlinkshop/

      # ── 8. Extract and redeploy on VPS ───────────────────────
      - name: 🚀 Deploy on VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
              set -e
              cd /opt/Barberlinkshop
              echo "=== Extracting build artifacts ==="
              tar -xzf deploy.tar.gz
              rm -f deploy.tar.gz

              echo "=== Rebuilding Docker image ==="
              docker compose build --no-cache barberlink

              echo "=== Restarting container ==="
              docker compose up -d --force-recreate barberlink

              sleep 5
              if docker ps --filter "name=barberlink_app" --filter "status=running" | grep -q "barberlink_app"; then
                echo "✅ BarberLink deployed successfully!"
                docker ps --filter "name=barberlink_app" --format "Status: {{.Status}}"
              else
                echo "❌ Container failed to start!"
                docker logs barberlink_app --tail 30
                exit 1
              fi
            '

      # ── 9. Notify ────────────────────────────────────────────
      - name: ✅ Deployment Success
        if: success()
        run: |
          echo "🎉 Successfully deployed to https://barberlink.cloud"
          echo "   Commit: ${{ github.sha }}"
          echo "   By: ${{ github.actor }}"

      - name: ❌ Deployment Failed
        if: failure()
        run: echo "💥 Deployment failed! Check the logs above."
