services:
  # ─── BarberLink Frontend (React/Vite) ────────────────────
  barberlink:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barberlink_app
    restart: unless-stopped
    networks:
      - barberlink_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.barberlink.rule=Host(`barberlink.cloud`) || Host(`www.barberlink.cloud`)"
      - "traefik.http.routers.barberlink.entrypoints=websecure"
      - "traefik.http.routers.barberlink.tls.certresolver=letsencrypt"
      - "traefik.http.services.barberlink.loadbalancer.server.port=80"

  # ─── Traefik Reverse Proxy + SSL ─────────────────────────
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@barberlink.cloud"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOCKER_API_VERSION: "1.41"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt_data:/letsencrypt"
    networks:
      - barberlink_net

networks:
  barberlink_net:
    driver: bridge

volumes:
  letsencrypt_data:
