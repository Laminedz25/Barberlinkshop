server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security: Block sensitive file access ─────────────────
    # Block bots probing for sensitive files
    location ~* (\.(env|git|svn|htaccess|htpasswd|bak|sql|log|config|conf|ini|json|lock|yaml|yml)|phpinfo|wp-admin|wp-login|xmlrpc)$ {
        return 444;
    }

    # Block access to hidden files and directories
    location ~ /\. {
        deny all;
        return 444;
    }

    # ─── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # ─── Cache static assets ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── SPA fallback — all routes go to index.html ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Security Headers ───────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https: wss: http://mail.barberlink.cloud:9080 http://localhost:9080 https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
}
